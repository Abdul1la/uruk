name: uruk_motors
description: "Uruk Motors - Car Maintenance Subscription App"
publish_to: 'none'

version: 1.0.0+8

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.8.1
  provider: ^6.1.2
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: ^0.20.2
  pin_code_fields: ^8.0.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  dotted_border: ^2.1.0
  shared_preferences: ^2.3.2
  cached_network_image: ^3.4.1
  fl_chart: ^0.69.0
  geolocator: ^13.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  geocoding: ^3.0.0
  url_launcher: ^6.3.2
  http: ^1.2.1
  video_player: ^2.9.1

  # Push notifications (FCM)
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.1

# Generates iOS + Android launcher icons from a single source image.
# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "images/app_icon.png"
  min_sdk_android: 21
  # iOS doesn't allow alpha on app icons — flatten against white.
  remove_alpha_ios: true
  background_color_ios: "#FFFFFF"
  # Android adaptive icons (API 26+).
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "images/app_icon.png"

# Generates the native splash screen on iOS + Android.
# Run: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#FFFFFF"
  image: "images/app_icon.png"
  android_12:
    color: "#FFFFFF"
    image: "images/app_icon.png"
  ios: true
  android: true

flutter:
  generate: true
  uses-material-design: true

  assets:
    - images/

