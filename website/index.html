<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uruk Motors — لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css?v=20260422b">
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════════
     LOGIN PAGE
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="login-page" class="login-page">
  <div class="login-card">
    <div class="login-logo"><i data-lucide="car"></i></div>
    <div class="login-title">URUK MOTORS</div>
    <div class="login-subtitle">لوحة التحكم</div>

    <div class="form-group">
      <label class="form-label">البريد الإلكتروني</label>
      <input class="form-input" id="login-email" type="email" dir="ltr" placeholder="you@uruk.iq">
    </div>
    <div class="form-group">
      <label class="form-label">كلمة المرور</label>
      <input class="form-input" id="login-pass" type="password" dir="ltr" placeholder="••••••">
    </div>

    <div id="login-error" class="hidden" style="background:var(--error-light);color:var(--error);padding:10px;border-radius:8px;font-size:12px;margin-bottom:12px"></div>

    <button class="btn btn-primary btn-block" onclick="login()">تسجيل الدخول</button>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════════════
     APP SHELL
     ═══════════════════════════════════════════════════════════════════════════ -->
<div id="app-page" class="app hidden">

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <i data-lucide="car" class="sidebar-logo-icon"></i>
      <span class="sidebar-logo">URUK</span>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <div class="sidebar-item" id="sidebar-logout">
        <i data-lucide="log-out" class="icon"></i>
        <span>تسجيل الخروج</span>
      </div>
      <!-- Small dev credit in the sidebar — visible but discreet -->
      <div class="sidebar-dev-credit">
        <img src="images/dev_logo.png" alt="abdullah">
        <div class="sidebar-dev-phone">07511130503</div>
        <div class="sidebar-dev-copy">© 2026 All Labs</div>
      </div>
    </div>
  </aside>

  <!-- Main -->
  <div class="main-content">
    <!-- Topbar -->
    <header class="topbar">
      <div class="topbar-spacer"></div>
      <div class="topbar-user">
        <span class="topbar-dept" id="topbar-dept"></span>
        <div class="topbar-avatar" id="topbar-avatar"></div>
        <span class="topbar-name" id="topbar-name"></span>
      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content" id="page-content"></main>
  </div>
</div>

<!-- Version-pinned script tags — bump the ?v= number on each deploy so the
     browser ignores cached copies of api.js / app.js and always fetches the
     latest. Prevents intermittent "Invalid credentials" caused by old JS that
     still points at the wrong API base. -->
<script src="js/data.js?v=20260422b"></script>
<script src="js/api.js?v=20260422b"></script>
<script src="js/app.js?v=20260422b"></script>
</body>
</html>
